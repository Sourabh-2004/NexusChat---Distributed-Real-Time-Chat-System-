# ================================================
# Nginx Configuration — Load Balancer + WebSocket Proxy
# ================================================
# Distributes traffic across multiple FastAPI instances
# with WebSocket upgrade support and sticky sessions

upstream chat_backend {
    # IP hash ensures WebSocket connections stick to the same backend
    # This is critical because WebSocket is a stateful protocol
    ip_hash;

    # FastAPI instances (Docker Compose networking)
    # When scaled with --scale app=N, Docker DNS resolves "app" to all instances
    server app:8000;
}

# Rate limiting zone (shared across workers)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=5r/s;

server {
    listen 80;
    server_name localhost;

    # --- Logging ---
    access_log /var/log/nginx/chat_access.log;
    error_log /var/log/nginx/chat_error.log;

    # --- Gzip Compression ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # --- Security Headers ---
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # --- Static Files (Client) ---
    location /client/ {
        alias /usr/share/nginx/html/client/;
        try_files $uri $uri/ /client/index.html;

        # Cache static assets
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # --- WebSocket Endpoint ---
    location /ws/ {
        limit_req zone=ws_limit burst=10 nodelay;

        proxy_pass http://chat_backend;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts (keep connections alive)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Disable buffering for real-time
        proxy_buffering off;
    }

    # --- API Endpoints ---
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://chat_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    # --- Health Check ---
    location /health {
        proxy_pass http://chat_backend;
        proxy_set_header Host $host;

        # No rate limiting on health checks
        access_log off;
    }

    # --- Swagger Docs ---
    location /docs {
        proxy_pass http://chat_backend;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://chat_backend;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://chat_backend;
        proxy_set_header Host $host;
    }

    # --- Root ---
    location / {
        proxy_pass http://chat_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
